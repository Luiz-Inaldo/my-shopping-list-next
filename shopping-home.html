<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ListaPé — Suas Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #fdfbf7;
    --fg:        #2d2d2d;
    --muted:     #e5e0d8;
    --accent:    #6c47c9;
    --accent-lt: #ede8f8;
    --accent-dk: #4d2fa3;
    --danger:    #ff4d4d;
    --danger-lt: #fff0f0;
    --border:    #2d2d2d;
    --white:     #ffffff;
    --yellow:    #fff9c4;
    --success:   #4caf7d;
    --shadow:    4px 4px 0px 0px #2d2d2d;
    --shadow-sm: 3px 3px 0px 0px #2d2d2d;
    --shadow-lg: 6px 6px 0px 0px #2d2d2d;
    --font-h:    'Kalam', cursive;
    --font-b:    'Patrick Hand', cursive;
    --r-wobbly:  255px 15px 225px 15px / 15px 225px 15px 255px;
    --r-card:    8px 20px 10px 18px / 20px 8px 18px 10px;
    --r-btn:     180px 12px 160px 12px / 12px 160px 12px 180px;
    --nav-h:     72px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image: radial-gradient(var(--muted) 1px, transparent 1px);
    background-size: 24px 24px;
    font-family: var(--font-b);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .phone-shell {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background-color: var(--bg);
    background-image: radial-gradient(var(--muted) 1px, transparent 1px);
    background-size: 24px 24px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
    background: var(--bg);
    border-bottom: 2px dashed var(--muted);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50% 40% 50% 40% / 40% 50% 40% 50%;
    border: 3px solid var(--border);
    box-shadow: var(--shadow-sm);
    background: var(--accent-lt);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-h);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-dk);
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-text .welcome {
    font-family: var(--font-b);
    font-size: 13px;
    color: var(--fg);
    opacity: 0.6;
    line-height: 1;
    margin-bottom: 2px;
  }

  .header-text .username {
    font-family: var(--font-h);
    font-size: 20px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1.1;
  }

  .notif-btn {
    width: 44px;
    height: 44px;
    border-radius: 14px 6px 12px 8px / 6px 14px 8px 12px;
    border: 2px solid var(--border);
    box-shadow: var(--shadow-sm);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    flex-shrink: 0;
  }

  .notif-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0px 0px var(--border);
  }

  .notif-badge {
    position: absolute;
    top: 6px;
    right: 7px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--danger);
    border: 2px solid var(--bg);
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 20px 18px;
    padding-bottom: calc(var(--nav-h) + 20px);
    overflow-y: auto;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--yellow);
    border: 2px solid var(--border);
    border-radius: 6px 14px 8px 12px / 14px 6px 12px 8px;
    box-shadow: 2px 2px 0px 0px var(--border);
    padding: 4px 12px 4px 8px;
    font-family: var(--font-b);
    font-size: 13px;
    font-weight: 400;
    color: var(--fg);
    margin-bottom: 16px;
    transform: rotate(-1deg);
  }

  .lists-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── LIST CARD ── */
  .list-card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow);
    padding: 16px;
    position: relative;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .list-card:nth-child(odd)  { transform: rotate(-0.6deg); }
  .list-card:nth-child(even) { transform: rotate(0.8deg);  }

  .list-card:hover {
    transform: rotate(0deg) translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .list-card.done {
    background: #f5f5f5;
    opacity: 0.85;
  }

  /* tape decoration */
  .tape {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 56px;
    height: 18px;
    background: rgba(200, 195, 230, 0.55);
    border-left: 1px solid rgba(108,71,201,0.2);
    border-right: 1px solid rgba(108,71,201,0.2);
    border-radius: 2px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-name {
    font-family: var(--font-h);
    font-size: 20px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1.15;
    max-width: 200px;
  }

  .card-emoji {
    font-size: 28px;
    line-height: 1;
    transform: rotate(5deg);
    display: inline-block;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--fg);
    opacity: 0.65;
    margin-bottom: 12px;
  }

  .meta-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--fg);
    opacity: 0.4;
  }

  .meta-done {
    font-family: var(--font-b);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    opacity: 1;
  }

  /* progress bar */
  .progress-wrap {
    margin-bottom: 14px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--fg);
    opacity: 0.6;
    margin-bottom: 5px;
    font-family: var(--font-b);
  }

  .progress-track {
    width: 100%;
    height: 10px;
    background: var(--muted);
    border: 2px solid var(--border);
    border-radius: 80px 20px 60px 20px / 20px 80px 20px 60px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 80px 20px 60px 20px / 20px 80px 20px 60px;
    background: var(--accent);
    transition: width 0.4s ease;
    position: relative;
  }

  .progress-fill.full {
    background: var(--success);
  }

  /* card actions */
  .card-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-primary {
    flex: 1;
    height: 40px;
    background: var(--accent);
    color: #ffffff;
    border: 2px solid var(--border);
    border-radius: var(--r-btn);
    box-shadow: var(--shadow-sm);
    font-family: var(--font-b);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
  }

  .btn-primary:hover  { background: var(--accent-dk); box-shadow: 2px 2px 0px 0px var(--border); transform: translate(2px,2px); }
  .btn-primary:active { box-shadow: none; transform: translate(4px,4px); }

  .btn-delete {
    width: 40px;
    height: 40px;
    background: var(--danger-lt);
    color: var(--danger);
    border: 2px solid var(--danger);
    border-radius: 10px 4px 8px 4px / 4px 10px 4px 8px;
    box-shadow: 3px 3px 0px 0px rgba(255,77,77,0.35);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.1s;
    flex-shrink: 0;
  }

  .btn-delete:hover  { background: var(--danger); color: #fff; box-shadow: 2px 2px 0px 0px rgba(200,0,0,0.5); transform: translate(1px,1px); }
  .btn-delete:active { box-shadow: none; transform: translate(3px,3px); }

  /* ── ADD BUTTON (floating) ── */
  .btn-add-float {
    position: fixed;
    bottom: calc(var(--nav-h) + 14px);
    right: 18px;
    transform: rotate(-1.5deg);
    z-index: 15;
    height: 48px;
    padding: 0 28px;
    background: var(--yellow);
    color: var(--fg);
    border: 2px solid var(--border);
    border-radius: var(--r-wobbly);
    box-shadow: var(--shadow);
    font-family: var(--font-b);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-add-float:hover  { transform: translate(2px, 2px) rotate(0deg); box-shadow: 2px 2px 0px 0px var(--border); }
  .btn-add-float:active { transform: translate(4px, 4px) rotate(0deg); box-shadow: none; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 24px;
    text-align: center;
  }

  .empty-state .empty-icon {
    font-size: 52px;
    line-height: 1;
    transform: rotate(-5deg);
    display: inline-block;
  }

  .empty-state p {
    font-family: var(--font-h);
    font-size: 18px;
    color: var(--fg);
    opacity: 0.55;
    line-height: 1.3;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: var(--nav-h);
    background: var(--white);
    border-top: 2px solid var(--border);
    border-radius: 18px 8px 0 0 / 8px 14px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
    z-index: 20;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 12px;
    border-radius: 14px 6px 12px 6px / 6px 14px 6px 12px;
    cursor: pointer;
    transition: transform 0.1s;
    min-width: 64px;
  }

  .nav-item:hover { transform: rotate(-1deg); }
  .nav-item:active { transform: scale(0.95); }

  .nav-item.active {
    background: var(--accent-lt);
    border: 2px solid var(--accent);
    box-shadow: 2px 2px 0px 0px var(--accent-dk);
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
    stroke: var(--fg);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-item.active svg { stroke: var(--accent-dk); }

  .nav-label {
    font-family: var(--font-b);
    font-size: 11px;
    color: var(--fg);
    opacity: 0.6;
    line-height: 1;
  }

  .nav-item.active .nav-label {
    color: var(--accent-dk);
    opacity: 1;
    font-weight: 700;
    font-family: var(--font-b);
  }

  .list-card:hover { animation: none; }

  /* SVG icons inline */
</style>
</head>
<body>

<div class="phone-shell">

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="header-left">
      <div class="avatar">JS</div>
      <div class="header-text">
        <p class="welcome">Bem-vindo de volta,</p>
        <p class="username">João Silva</p>
      </div>
    </div>

    <button class="notif-btn" title="Notificações">
      <!-- bell icon -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2d2d2d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge"></span>
    </button>
  </header>

  <!-- ══ MAIN ══ -->
  <main class="main">

    <div class="section-label">
      Listas ativas (3)
    </div>

    <div class="lists-stack" id="lists-container">

      <!-- CARD 1 -->
      <div class="list-card" data-id="1">
        <div class="tape"></div>
        <div class="card-header">
          <span class="card-name">Mercado Semanal</span>
        </div>
        <div class="card-meta">
          <span>12 itens</span>
          <span class="meta-dot"></span>
          <span class="meta-done">67% concluído</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>8 de 12 marcados</span>
            <span>67%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 67%"></div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Ver lista
          </button>
          <button class="btn-delete" title="Excluir lista" onclick="deleteCard(1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <!-- CARD 2 -->
      <div class="list-card" data-id="2">
        <div class="tape"></div>
        <div class="card-header">
          <span class="card-name">Churrasco de Sábado</span>
        </div>
        <div class="card-meta">
          <span>7 itens</span>
          <span class="meta-dot"></span>
          <span class="meta-done">29% concluído</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>2 de 7 marcados</span>
            <span>29%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 29%"></div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Ver lista
          </button>
          <button class="btn-delete" title="Excluir lista" onclick="deleteCard(2)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <!-- CARD 3 -->
      <div class="list-card" data-id="3">
        <div class="tape"></div>
        <div class="card-header">
          <span class="card-name">Farmácia</span>
        </div>
        <div class="card-meta">
          <span>4 itens</span>
          <span class="meta-dot"></span>
          <span class="meta-done" style="color: var(--success)">100% concluído</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>4 de 4 marcados</span>
            <span>100%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill full" style="width: 100%"></div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-primary" style="background: var(--success);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Ver lista
          </button>
          <button class="btn-delete" title="Excluir lista" onclick="deleteCard(3)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

    </div>

    <!-- floating add button -->
    <button class="btn-add-float">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova lista
    </button>

  </main>

  <!-- ══ BOTTOM NAV ══ -->
  <nav class="bottom-nav">

    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Início</span>
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="nav-label">Histórico</span>
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
      <span class="nav-label">Ajustes</span>
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <span class="nav-label">Menu</span>
    </div>

  </nav>

</div>

<script>
  function deleteCard(id) {
    const card = document.querySelector(`.list-card[data-id="${id}"]`);
    if (!card) return;
    card.style.transition = 'transform 0.25s, opacity 0.25s';
    card.style.transform = 'rotate(-8deg) translateX(-120%) scale(0.8)';
    card.style.opacity = '0';
    card.style.animation = 'none';
    setTimeout(() => {
      card.remove();
      updateCount();
      checkEmpty();
    }, 280);
  }

  function updateCount() {
    const remaining = document.querySelectorAll('.list-card').length;
    const label = document.querySelector('.section-label');
    if (label) label.textContent = `Listas ativas (${remaining})`;
  }

  function checkEmpty() {
    const container = document.getElementById('lists-container');
    if (!container.querySelector('.list-card')) {
      container.innerHTML = `
        <div class="empty-state">
          <p>Nenhuma lista ativa.<br/>Crie uma nova abaixo!</p>
        </div>`;
    }
  }

  // nav highlight on click
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    });
  });
</script>
</body>
</html>
